<!DOCTYPE html><html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The RussX Services</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;font-family:'Orbitron',sans-serif;background:radial-gradient(circle at top,#050505,#000);color:white;}
header{text-align:center;padding:35px;font-size:32px;letter-spacing:3px;border-bottom:1px solid #111;text-shadow:0 0 15px #00ffff55;}
.container{max-width:1200px;margin:auto;padding:30px 20px;}
.services{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:25px;}
.card{background:linear-gradient(145deg,#070707,#0d0d0d);border:1px solid #1a1a1a;border-radius:20px;padding:25px;text-align:center;transition:.35s;position:relative;overflow:hidden;}
.card:hover{transform:translateY(-8px) scale(1.03);box-shadow:0 0 30px #00ffff33;border-color:#00ffff55;}
.price{color:#00ffff;font-size:20px;margin:15px 0;}
button{background:#00ffff;border:none;padding:12px 22px;border-radius:10px;cursor:pointer;font-weight:bold;transition:.3s;}
button:hover{background:#00caca;transform:scale(1.05);}
form{margin-top:50px;background:#060606;padding:25px;border-radius:20px;border:1px solid #111;box-shadow:0 0 25px #00ffff11;}
input,select{width:100%;margin:12px 0;padding:14px;background:#0f0f0f;border:1px solid #222;color:white;border-radius:10px;font-family:'Orbitron';}
footer{margin-top:60px;text-align:center;padding:25px;border-top:1px solid #111;color:#aaa;font-size:14px;}
.footer-links{margin-top:10px;color:#00ffff;}
.language-btns{text-align:center;margin-bottom:10px;}
.language-btns button{margin:0 5px;background:#111;color:#00ffff;padding:6px 12px;border-radius:8px;border:none;cursor:pointer;transition:.3s;}
.language-btns button:hover{background:#00caca;color:#000;}
</style>
</head>
